<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Secure login portal for {{ school_name }}" />
  <title>Login | {{ school_name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}" />
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-card { background: white; border-radius: 24px; padding: 48px 40px; max-width: 440px; width: 100%; box-shadow: 0 40px 80px rgba(0,0,0,0.5); animation: slideIn 0.4s ease; }
    .login-logo { width: 72px; height: 72px; background: linear-gradient(135deg,#4f46e5,#7c3aed); border-radius: 20px; display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 24px; box-shadow: 0 8px 20px rgba(79,70,229,0.4); }
    .login-title { font-family:'Poppins',sans-serif;font-size:26px;font-weight:800;text-align:center;color:#1e293b;line-height:1.2;margin-bottom:6px; }
    .login-sub { font-size:14px;color:#64748b;text-align:center;margin-bottom:36px; }
    .login-field label { display:block;font-size:12px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px; }
    .login-field input { width:100%;padding:14px 16px;border:2px solid #e2e8f0;border-radius:12px;font-size:16px;font-family:'Inter',sans-serif;transition:all 0.2s;background:#f8fafc;outline:none; }
    .login-field input:focus { border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,0.12);background:white; }
    .login-field { margin-bottom:20px; }
    .login-btn { width:100%;padding:15px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 16px rgba(79,70,229,0.35); }
    .login-btn:hover { transform:translateY(-2px);box-shadow:0 8px 24px rgba(79,70,229,0.45); }
    .login-btn:active { transform:translateY(0); }
    .remember-row { display:flex;align-items:center;justify-content:space-between;margin-bottom:24px; }
    .remember-check { display:flex;align-items:center;gap:8px;font-size:14px;color:#475569;cursor:pointer; }
    .remember-check input { width:18px;height:18px;accent-color:#4f46e5;cursor:pointer; }
    .error-msg { background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:20px;display:flex;align-items:center;gap:8px; }
    .role-hint { background:#f8fafc;border-radius:12px;padding:16px;margin-top:24px;text-align:center; }
    .role-hint p { font-size:12px;color:#94a3b8; }
    .role-hint code { background:#e2e8f0;padding:2px 8px;border-radius:6px;font-family:monospace;font-size:13px;color:#475569; }
    @keyframes slideIn { from { opacity:0;transform:translateY(20px); } to { opacity:1;transform:translateY(0); } }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">🏫</div>
    <h1 class="login-title">{{ school_name }}</h1>
    <p class="login-sub">Management Portal · Secure Login</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="error-msg" role="alert">
          <span>⚠</span> {{ message }}
        </div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}" id="login-form" autocomplete="on">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}" />

      <div class="login-field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username"
               required autofocus autocomplete="username"
               style="font-size:16px;" />
      </div>

      <div class="login-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••"
               required autocomplete="current-password"
               style="font-size:16px;" />
      </div>

      <div class="remember-row">
        <label class="remember-check">
          <input type="checkbox" name="remember" id="remember" />
          Keep me signed in
        </label>
      </div>

      <button type="submit" class="login-btn" id="login-submit">
        Sign In →
      </button>
    </form>

    <!-- Default credentials hint (remove in production) -->
    <div class="role-hint">
      <p style="font-weight:600;color:#64748b;margin-bottom:6px;">Default Credentials</p>
      <p>Admin: <code>principal</code> / <code>admin123</code></p>
      <p style="margin-top:4px;">Teacher demo: <code>teacher1</code> / <code>teacher123</code></p>
    </div>
  </div>

  <script>
    // Show loading state on submit
    document.getElementById('login-form').addEventListener('submit', function() {
      const btn = document.getElementById('login-submit');
      btn.textContent = 'Signing in…';
      btn.style.opacity = '0.8';
      btn.disabled = true;
    });
  </script>
</body>
</html>
