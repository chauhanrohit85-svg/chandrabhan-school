{% extends "base.html" %}
{% block title %}Edit Student — {{ student.full_name }}{% endblock %}
{% block page_title %}Edit Student Profile{% endblock %}

{% block content %}
<div style="max-width:600px; margin:0 auto;">
  <div class="card">
    <div class="card-header">
      <h2>✏️ Edit Profile: {{ student.full_name }}</h2>
      <a href="{{ url_for('teacher.students') }}" class="btn btn-outline btn-sm">← Back to Roster</a>
    </div>
    <div class="card-body">
      <form method="POST" action="{{ url_for('teacher.edit_student', student_id=student.id) }}">
        <div class="form-group">
          <label class="form-label">Roll Number</label>
          <input type="text" name="roll_number" class="form-control" value="{{ student.roll_number }}" required />
        </div>
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" name="full_name" class="form-control" value="{{ student.full_name }}" required />
        </div>
        <div class="form-group">
          <label class="form-label">Parent Contact Number</label>
          <input type="text" name="parent_contact" class="form-control" value="{{ student.parent_contact or '' }}" />
        </div>
        <div class="form-group">
          <label class="form-label">Class Section</label>
          <input type="text" class="form-control" value="{{ student.class_ref.display_name }}" disabled style="opacity:0.6;" />
        </div>
        <label class="form-check" style="margin-bottom:24px;">
          <input type="checkbox" name="is_active" {% if student.is_active %}checked{% endif %} />
          <span style="font-weight:600; color:#475569;">Active Enrolment Status</span>
        </label>
        <button type="submit" class="btn btn-primary" style="width:100%;">Save Changes</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
